<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0D0D0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Younirise">
<title>Younirise</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0D0D0D}
body{font-family:'DM Sans',system-ui,sans-serif;color:#F2F0EB;overscroll-behavior:none}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}

:root{
  --bg:#0D0D0D;--sf:#161616;--card:#1E1E1E;--card2:#242424;
  --bdr:#2A2A2A;--bdr2:#363636;
  --tx:#F2F0EB;--mu:#5C5C56;--mu2:#8C8C84;
  --gr:#3DDD7A;--grd:#0C1F14;--grm:#122A1A;
  --go:#F5A524;--god:#241800;
  --bl:#4DA8FF;--bld:#0A1828;
  --re:#FF5757;--red:#1F0A0A;
  --or:#FF8A3D;--ord:#1F1008;
  --pu:#A855F7;--pud:#180A2A;
  --nav:60px;--hdr:52px;--safe:env(safe-area-inset-bottom,0px)
}

/* ── SHELL ─────────────────────────────── */
#screen-load{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100}
.load-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em}
.load-logo span{color:var(--gr)}
.spinner{width:28px;height:28px;border:2px solid var(--bdr2);border-top-color:var(--gr);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#screen-login{position:fixed;inset:0;background:var(--bg);display:none;overflow-y:auto;padding:32px 20px 60px}
#screen-app{position:fixed;inset:0;display:none;flex-direction:column}

/* ── LOGIN ─────────────────────────────── */
.login-wrap{max-width:420px;margin:0 auto}
.login-logo{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.login-logo span{color:var(--gr)}
.login-sub{color:var(--mu2);font-size:14px;margin-bottom:36px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.role-btn{background:var(--card);border:2px solid var(--bdr);border-radius:16px;padding:18px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:6px;cursor:pointer;transition:all .15s;text-align:left}
.role-btn:hover{border-color:var(--bdr2);background:var(--card2)}
.role-btn.sel{border-color:var(--gr);background:var(--grm)}
.role-ic{font-size:24px;margin-bottom:2px}
.role-lbl{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.role-hint{font-size:11px;color:var(--mu2)}
.login-step2{display:none;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ls-label{font-size:12px;font-weight:600;color:var(--mu2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.ls-sel{width:100%;background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:13px 14px;color:var(--tx);font-family:inherit;font-size:14px;margin-bottom:16px;appearance:none;cursor:pointer}
.ls-sel:focus{outline:none;border-color:var(--gr)}
.coach-list{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.coach-btn{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;font-size:13px;font-weight:600}
.coach-btn:hover{border-color:var(--bdr2)}
.coach-btn.sel{border-color:var(--gr);background:var(--grm);color:var(--gr)}
.pin-wrap{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.pin-input{flex:1;background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:13px 14px;color:var(--tx);font-family:inherit;font-size:18px;letter-spacing:4px;text-align:center}
.pin-input:focus{outline:none;border-color:var(--gr)}
.pin-input.err{border-color:var(--re);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.err-msg{color:var(--re);font-size:13px;margin-bottom:12px;display:none}
.btn-login{width:100%;background:var(--gr);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;border:none;border-radius:12px;padding:15px;cursor:pointer;transition:opacity .15s}
.btn-login:hover{opacity:.88}
.back-btn{background:none;border:none;color:var(--mu2);font-size:13px;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:4px;margin-bottom:16px}

/* ── APP SHELL ─────────────────────────── */
#app-hdr{height:var(--hdr);background:var(--sf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:50}
.hdr-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.02em}
.hdr-logo span{color:var(--gr)}
.hdr-user{font-size:12px;color:var(--mu2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-out{background:none;border:1px solid var(--bdr);border-radius:8px;color:var(--mu2);font-size:12px;padding:5px 10px;cursor:pointer}
#app-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav) + var(--safe) + 16px)}
#app-nav{height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);background:var(--sf);border-top:1px solid var(--bdr);display:flex;flex-shrink:0;z-index:50}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--mu);cursor:pointer;padding:6px 4px;font-family:inherit;position:relative;transition:color .15s}
.ni.on{color:var(--gr)}
.ni-ic{font-size:20px;line-height:1}
.ni-lb{font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.ni-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--re);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;min-width:16px;text-align:center}

/* ── DESKTOP ───────────────────────────── */
@media(min-width:768px){
  #screen-app{flex-direction:row}
  #app-hdr{display:none}
  #app-nav{width:200px;height:100vh;flex-direction:column;border-top:none;border-right:1px solid var(--bdr);padding:0;justify-content:flex-start;align-items:stretch}
  #nav-logo{padding:20px 16px 14px;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.02em;border-bottom:1px solid var(--bdr);margin-bottom:6px}
  #nav-logo span{color:var(--gr)}
  #nav-bot{margin-top:auto;padding:14px;border-top:1px solid var(--bdr)}
  #nav-bot-user{font-size:12px;color:var(--mu2);margin-bottom:8px;padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ni{flex-direction:row;justify-content:flex-start;gap:10px;padding:11px 14px;border-radius:10px;margin:1px 8px;min-height:unset;flex:none;width:auto}
  .ni-ic{font-size:16px}
  .ni-lb{font-size:13px;font-weight:600;letter-spacing:0;text-transform:none}
  .ni.on{background:var(--grm);color:var(--gr)}
  #app-content{flex:1;padding-bottom:24px}
  .pg{max-width:800px!important;padding:28px 32px!important}
  .mb{border-radius:18px;max-width:540px;margin:auto;max-height:88vh}
  .mo{align-items:center;padding:24px}
  .sg{grid-template-columns:repeat(4,1fr)!important}
  .ni-badge{right:calc(50% - 20px)}
}

/* ── PAGE ──────────────────────────────── */
.pg{padding:14px;max-width:100%;animation:pgIn .16s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.st{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--mu2);letter-spacing:.06em;text-transform:uppercase;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.st:first-child{margin-top:0}

/* ── STAT GRID ─────────────────────────── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px 12px}
.sv{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;margin-bottom:3px}
.sl{font-size:10px;color:var(--mu);letter-spacing:.05em;text-transform:uppercase}

/* ── CARDS ─────────────────────────────── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px}
.card-sm{background:var(--card2);border-radius:10px;padding:10px 12px;margin-bottom:8px}

/* ── ALERTS ────────────────────────────── */
.al{border-radius:12px;padding:10px 13px;margin-bottom:10px;font-size:13px;line-height:1.5}
.al-r{background:var(--red);color:var(--re);border:1px solid #3A1010}
.al-g{background:var(--grd);color:var(--gr);border:1px solid #133020}
.al-o{background:var(--god);color:var(--go);border:1px solid #3A2400}
.al-b{background:var(--bld);color:var(--bl);border:1px solid #0C2040}

/* ── LIVE BANNER ───────────────────────── */
.live-banner{background:var(--grm);border:1px solid var(--gr);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden}
.live-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gr),transparent);animation:sweep 2s linear infinite}
@keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);display:inline-block;margin-right:6px;box-shadow:0 0 8px var(--gr);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--gr);display:flex;align-items:center;margin-bottom:4px}
.live-sub{font-size:12px;color:var(--mu2)}
.live-sub strong{color:var(--tx)}
.live-cta{font-size:12px;color:var(--gr);font-weight:600;margin-top:8px}

/* ── SESSION CARD ──────────────────────── */
.sess-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:13px;margin-bottom:8px}
.sess-card.live{border-color:var(--gr)}
.sess-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.sess-info{flex:1;min-width:0}
.sess-players{font-weight:600;font-size:14px;margin:5px 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-time{font-size:12px;color:var(--mu2)}
.sess-time strong{color:var(--gr)}
.sess-note{font-size:12px;color:var(--mu2);margin-top:6px;padding:7px 9px;background:var(--card2);border-radius:8px;border-left:3px solid var(--bdr2)}
.sess-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}

/* ── BADGES ────────────────────────────── */
.b{display:inline-flex;align-items:center;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.bg{background:var(--grd);color:var(--gr);border:1px solid #1A4028}
.bb{background:var(--bld);color:var(--bl);border:1px solid #0C2848}
.bo{background:var(--ord);color:var(--or);border:1px solid #3A2010}
.bp{background:var(--pud);color:var(--pu);border:1px solid #2A1048}
.br{background:var(--red);color:var(--re);border:1px solid #3A1010}
.bm{background:#1A1A1A;color:var(--mu2);border:1px solid var(--bdr)}
.bgo{background:var(--god);color:var(--go);border:1px solid #3A2400}

/* ── BUTTONS ───────────────────────────── */
.btn{border:none;border-radius:10px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--gr);color:#000;padding:10px 16px;font-size:13px}
.btn-p:hover{opacity:.88}
.btn-s{background:var(--card2);color:var(--tx);padding:10px 16px;font-size:13px;border:1px solid var(--bdr)}
.btn-s:hover{border-color:var(--bdr2)}
.btn-d{background:var(--red);color:var(--re);padding:8px 12px;font-size:12px;border:1px solid var(--re)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn-w{width:100%}
.btn-del{background:var(--red);color:var(--re);border:1px solid var(--re);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:600}
.btn-del:hover{background:#3A1010}

/* ── PLAYER ROW ────────────────────────── */
.player-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.player-row:last-child{border-bottom:none}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:13px}
.player-name{font-weight:600;font-size:14px}
.player-meta{font-size:11px;color:var(--mu2);margin-top:2px}

/* ── POTM ──────────────────────────────── */
.potm{background:linear-gradient(135deg,var(--god),var(--card));border:1px solid #3A2800;border-radius:14px;padding:16px;margin-bottom:12px}

/* ── SKILLS ────────────────────────────── */
.sk-row{margin-bottom:10px}
.sk-hd{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.sk-tr{background:var(--bdr);border-radius:4px;height:4px;overflow:hidden}
.sk-fl{height:100%;border-radius:4px;transition:width .4s ease}

/* ── CALENDAR ──────────────────────────── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.cal-dl{font-size:10px;color:var(--mu);text-align:center;padding:4px 0;font-weight:700}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;font-size:12px;color:var(--mu2);cursor:pointer;position:relative;transition:background .12s;overflow:hidden}
.cal-day:not(.off):hover{background:var(--card2)}
.cal-day:not(.off):active{background:var(--bdr)}
.cal-day.today{background:var(--grd);color:var(--gr);font-weight:700}
.cal-day.off{color:var(--bdr2);pointer-events:none}
.cal-stripes{display:flex;gap:1px;width:calc(100% - 6px);position:absolute;bottom:3px;height:3px;justify-content:center}
.cal-stripe{flex:1;border-radius:2px;max-width:10px}
.cal-legend{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 12px}
.cal-leg-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--mu)}
.cal-leg-dot{width:8px;height:8px;border-radius:2px}

/* ── FORMS ─────────────────────────────── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--mu2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.fi{width:100%;background:var(--card2);border:1.5px solid var(--bdr);border-radius:10px;padding:11px 13px;color:var(--tx);font-family:inherit;font-size:14px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--gr)}
.fs{appearance:none;cursor:pointer}
.fta{resize:none;min-height:72px;line-height:1.5}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chk-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
.chk-item{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.chk-item input{accent-color:var(--gr);width:16px;height:16px}

/* ── MODAL ─────────────────────────────── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;flex-direction:column;justify-content:flex-end;z-index:200;animation:moIn .2s ease}
@keyframes moIn{from{opacity:0}to{opacity:1}}
.mb{background:var(--sf);border-radius:20px 20px 0 0;padding:20px 18px;overflow-y:auto;max-height:92vh;padding-bottom:calc(20px + var(--safe))}
.mh{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 18px}
.mt{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
.ms{font-size:13px;color:var(--mu2);margin-bottom:16px}
.ma{display:flex;gap:8px;margin-top:18px}
.ma .btn{flex:1}

/* ── MATCH ─────────────────────────────── */
.match-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bdr)}
.match-row:last-child{border-bottom:none}

/* ── NOTES ─────────────────────────────── */
.note-card{background:var(--card2);border-left:3px solid var(--gr);border-radius:0 10px 10px 0;padding:11px;margin-bottom:8px}
.note-meta{font-size:11px;color:var(--mu);margin-bottom:5px}
.note-text{font-size:13px;line-height:1.6}

/* ── FEE ROW ───────────────────────────── */
.fee-row{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--bdr)}
.fee-row:last-child{border-bottom:none}

/* ── REQUEST CARD ──────────────────────── */
.req-card{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px}
.req-actions{display:flex;gap:6px;margin-top:10px}
.req-actions .btn{flex:1;font-size:12px;padding:8px 10px}

/* ── EMPTY ─────────────────────────────── */
.empty{text-align:center;padding:40px 20px;color:var(--mu)}
.empty-ic{font-size:36px;margin-bottom:12px}
.empty-txt{font-size:14px;line-height:1.5}

/* ── TOAST ─────────────────────────────── */
#toast{position:fixed;bottom:calc(var(--nav) + var(--safe) + 12px);left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);font-size:13px;font-weight:600;padding:10px 18px;border-radius:24px;display:none;z-index:999;white-space:nowrap;pointer-events:none}

/* ── TOUR TOGGLE ───────────────────────── */
.tour-hd{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:13px 14px}
.tour-bd{padding:0 14px 13px;display:none}
.tour-bd.open{display:block}

/* ── ATT DOTS ──────────────────────────── */
.att-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--bdr);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.att-btn.present{background:var(--grd);border-color:var(--gr)}
.att-btn.absent{background:var(--red);border-color:var(--re)}
</style>
</head>
<body>

<!-- Loading -->
<div id="screen-load">
  <div class="load-logo">Younirise<span>.</span></div>
  <div class="spinner"></div>
</div>

<!-- Login -->
<div id="screen-login">
  <div class="login-wrap">
    <div class="login-logo">Younirise<span>.</span></div>
    <div class="login-sub">Tennis Academy</div>

    <div id="step1">
      <div style="font-size:12px;font-weight:600;color:var(--mu2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">Select your role</div>
      <div class="role-grid">
        <button class="role-btn" data-t="admin" onclick="selectRole(this)">
          <div class="role-ic">🔐</div>
          <div class="role-lbl">Admin</div>
          <div class="role-hint">Full access</div>
        </button>
        <button class="role-btn" data-t="coach" onclick="selectRole(this)">
          <div class="role-ic">🎾</div>
          <div class="role-lbl">Coach</div>
          <div class="role-hint">Sessions & players</div>
        </button>
        <button class="role-btn" data-t="player" onclick="selectRole(this)">
          <div class="role-ic">👤</div>
          <div class="role-lbl">Player</div>
          <div class="role-hint">Your dashboard</div>
        </button>
        <button class="role-btn" data-t="parent" onclick="selectRole(this)">
          <div class="role-ic">👨‍👩‍👦</div>
          <div class="role-lbl">Parent</div>
          <div class="role-hint">Fees & schedule</div>
        </button>
      </div>
    </div>

    <div class="login-step2" id="step2">
      <button class="back-btn" onclick="backToStep1()">← Back</button>
      <div id="step2-content"></div>
      <div class="ls-label" id="pin-label">Enter PIN</div>
      <div class="pin-wrap"><input class="pin-input" id="pin-inp" type="password" maxlength="4" inputmode="numeric" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"></div>

  storageBucket:"tennis-dashboard-6d35b.firebasestorage.app",

// ── CONSTANTS ────────────────────────────
const ADMIN_PIN='0000';
const COACHES=[{id:'yash',name:'Yash Deshmukh',pin:'1111'},{id:'anup',name:'Anup Shinde',pin:'2222'},{id:'milind',name:'Milind Nagarkar',pin:'3333'}];
const SESS_TYPES=['Tennis Practice','1-on-1','Fitness','Mental Health','Tournament','Rest Day'];
const SESS_COL={'Tennis Practice':'bg','1-on-1':'bb','Fitness':'bo','Mental Health':'bp','Tournament':'bgo','Rest Day':'bm'};
const SESS_HEX={'Tennis Practice':'#3DDD7A','1-on-1':'#4DA8FF','Fitness':'#FF8A3D','Mental Health':'#A855F7','Tournament':'#F5A524','Rest Day':'#5C5C56'};
const SKILLS=['Forehand','Backhand','Serve','Footwork','Volleys'];
const AV_COLS=['#3DDD7A','#4DA8FF','#F5A524','#FF5757','#A855F7','#FF8A3D','#34D399','#F472B6','#A78BFA','#38BDF8'];

// ── STATE ────────────────────────────────
const S={
  user:null,tab:'home',
  players:[],sessions:[],tournaments:[],matches:[],
  fees:[],notes:[],skillLogs:[],attendance:[],potm:[],requests:[],
  calMonth:new Date(),openTour:null,unsubs:[]
};

// ── UTILS ────────────────────────────────
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m,ms=2400){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',ms);}
function fmtD(ts){if(!ts)return'—';const d=ts?.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function fmtDs(ts){if(!ts)return'—';const d=ts?.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
function ini(n){return(n||'').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);}
function avc(n){let h=0;for(const c of(n||''))h=(h*31+c.charCodeAt(0))%AV_COLS.length;return AV_COLS[h];}
function skc(v){return v>=75?'var(--gr)':v>=50?'var(--go)':'var(--mu2)';}
function pct(n,d){return d===0?0:Math.round(n/d*100);}
function isA(){return S.user?.type==='admin';}
function isC(){return S.user?.type==='coach';}
function isCA(){return isA()||isC();}
function isPl(){return S.user?.type==='player';}
function isPa(){return S.user?.type==='parent';}
function pid(){return S.user?.playerId;}
function toDate(ts){return ts?.toDate?ts.toDate():new Date(ts||0);}
function sameDay(a,b){return a.getDate()===b.getDate()&&a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear();}
function todayRange(){const s=new Date();s.setHours(0,0,0,0);const e=new Date();e.setHours(23,59,59,999);return{s,e};}
function moRange(){const n=new Date();return{s:new Date(n.getFullYear(),n.getMonth(),1),e:new Date(n.getFullYear(),n.getMonth()+1,0,23,59,59)};}

// ── DB ───────────────────────────────────
const dbAdd=(c,d)=>addDoc(collection(db,c),{...d,createdAt:serverTimestamp()});
const dbSet=(c,id,d)=>setDoc(doc(db,c,id),d,{merge:true});
const dbUpd=(c,id,d)=>updateDoc(doc(db,c,id),d);
const dbDel=(c,id)=>deleteDoc(doc(db,c,id));

// ── LISTENERS ────────────────────────────
function listen(){
  const cols=['players','sessions','tournaments','matches','fees','notes','skillLogs','attendance','potm','requests'];
  S.unsubs=cols.map(c=>onSnapshot(collection(db,c),snap=>{
    S[c]=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(S.user)schedRender();
  }));
}
function unlisten(){S.unsubs.forEach(u=>u());S.unsubs=[];}
let _rt=null;
function schedRender(){clearTimeout(_rt);_rt=setTimeout(render,100);}

// ── DATA HELPERS ─────────────────────────
function pAtt(id){const a=S.attendance.filter(x=>x.playerId===id);return a.length?pct(a.filter(x=>x.present).length,a.length):0;}
function pFee(id){return[...S.fees.filter(x=>x.playerId===id)].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))[0]||null;}
function pSkills(id){const l=[...S.skillLogs.filter(x=>x.playerId===id)].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));return l[0]?.skills||{Forehand:50,Backhand:50,Serve:50,Footwork:50,Volleys:50};}
function pWL(id){const m=S.matches.filter(x=>x.playerId===id&&(x.result==='W'||x.result==='L'));return{w:m.filter(x=>x.result==='W').length,l:m.filter(x=>x.result==='L').length};}

// ── LOGIN STATE ──────────────────────────
let LT=null,LSID=null;

window.selectRole=function(btn){
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  LT=btn.dataset.t;
  LSID=null;
  $('step1').style.display='none';
  $('step2').style.display='block';
  const c=$('step2-content');
  $('err-msg').style.display='none';
  $('pin-inp').value='';
  $('pin-inp').classList.remove('err');

  if(LT==='coach'){
    c.innerHTML='<div class="ls-label">Select coach</div><div class="coach-list">'+
      COACHES.map(co=>'<button class="coach-btn" data-id="'+co.id+'" onclick="selCoach(this)">'+co.name.split(' ')[0]+'</button>').join('')+'</div>';
    $('pin-label').textContent='Coach PIN';
  } else if(LT==='player'||LT==='parent'){
    const lbl=LT==='player'?'Select player':'Select child';
    if(S.players.length){
      c.innerHTML='<div class="ls-label">'+lbl+'</div><select class="fi fs" id="player-sel" onchange="setLSID(this.value)" style="margin-bottom:14px"><option value="">— Choose —</option>'+
        S.players.map(p=>'<option value="'+p.id+'">'+esc(p.name)+(p.category?' · '+p.category:'')+'</option>').join('')+'</select>';
    } else {
      c.innerHTML='<div style="font-size:13px;color:var(--mu);margin-bottom:14px">No players added yet.</div>';
    }
    $('pin-label').textContent=LT==='player'?'Player PIN':'Parent PIN';
  } else {
    c.innerHTML='';
    $('pin-label').textContent='Admin PIN';
  }
  setTimeout(()=>$('pin-inp').focus(),100);

window.selCoach=function(btn){
  document.querySelectorAll('.coach-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  LSID=btn.dataset.id;
};

window.backToStep1=function(){
  $('step1').style.display='block';
  $('step2').style.display='none';
  LT=null;LSID=null;
};

window.setLSID=function(v){LSID=v;};
window.doLogin=function(){
  const pin=$('pin-inp').value.trim();
  const bad=()=>{$('err-msg').style.display='block';$('pin-inp').classList.add('err');$('pin-inp').value='';};
  $('err-msg').style.display='none';$('pin-inp').classList.remove('err');
  if(!LT){toast('Select a role');return;}

  if(LT==='admin'){
    if(pin!==ADMIN_PIN){bad();return;}
    S.user={type:'admin',name:'Admin',id:'admin'};
  } else if(LT==='coach'){
    if(!LSID){toast('Select a coach');return;}
    const co=COACHES.find(x=>x.id===LSID);
    if(!co||pin!==co.pin){bad();return;}
    S.user={type:'coach',name:co.name,id:co.id};
  } else if(LT==='player'){
    if(!LSID){toast('Select your name');return;}
    const p=S.players.find(x=>x.id===LSID);
    if(!p||pin!==p.playerPin){bad();return;}
    S.user={type:'player',name:p.name,id:'pl_'+p.id,playerId:p.id};
  } else if(LT==='parent'){
    if(!LSID){toast('Select your child');return;}
    const p=S.players.find(x=>x.id===LSID);
    if(!p||pin!==p.parentPin){bad();return;}
    S.user={type:'parent',name:'Parent · '+p.name,id:'pa_'+p.id,playerId:p.id};
  }

  try{localStorage.setItem('yu_user',JSON.stringify(S.user));}catch(e){}
  enterApp();
};

function enterApp(){
  $('screen-login').style.display='none';
  $('screen-app').style.display='flex';
  $('hdr-user').textContent=S.user.name;
  S.tab='home';
  buildNav();
  render();
}

window.signOut=function(){
  unlisten();
  S.user=null;
  try{localStorage.removeItem('yu_user');}catch(e){}
  LT=null;LSID=null;
  $('screen-app').style.display='none';
  $('screen-login').style.display='block';
  $('step1').style.display='block';
  $('step2').style.display='none';
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('sel'));
  // Refresh player list
  getDocs(collection(db,'players')).then(snap=>{S.players=snap.docs.map(d=>({id:d.id,...d.data()}));listen();});
};

// ── NAV ──────────────────────────────────
function buildNav(){
  let tabs=[];
  if(isCA())       tabs=[{id:'home',ic:'🏠',lb:'Home'},{id:'players',ic:'👥',lb:'Players'},{id:'calendar',ic:'📅',lb:'Schedule'},{id:'matches',ic:'🏆',lb:'Matches'},{id:'fees',ic:'💰',lb:'Fees'}];
  else if(isPl())  tabs=[{id:'home',ic:'📊',lb:'Stats'},{id:'calendar',ic:'📅',lb:'Schedule'},{id:'matches',ic:'🏆',lb:'Matches'},{id:'notes',ic:'📝',lb:'Notes'}];
  else if(isPa())  tabs=[{id:'home',ic:'🏠',lb:'Home'},{id:'fees',ic:'💰',lb:'Fees'},{id:'calendar',ic:'📅',lb:'Schedule'}];

  const pending=(S.requests||[]).filter(r=>r.status==='pending').length;
  const isDesk=window.innerWidth>=768;
  let h='';
  if(isDesk) h='<div id="nav-logo">Younirise<span>.</span></div>';
  h+=tabs.map(t=>{
    const badge=(t.id==='home'&&isCA()&&pending)?'<span class="ni-badge">'+pending+'</span>':'';
    return'<button class="ni'+(S.tab===t.id?' on':'')+'" onclick="sw(\''+t.id+'\')"><span class="ni-ic">'+t.ic+'</span><span class="ni-lb">'+t.lb+'</span>'+badge+'</button>';
  }).join('');
  if(isDesk) h+='<div id="nav-bot"><div id="nav-bot-user">'+esc(S.user?.name||'')+'</div><button class="btn btn-s btn-w btn-sm" onclick="signOut()">Sign out</button></div>';
  $('app-nav').innerHTML=h;
}

window.sw=t=>{S.tab=t;buildNav();render();};
window.addEventListener('resize',()=>{if(S.user)buildNav();});

// ── RENDER ───────────────────────────────
function render(){
  const c=$('app-content');if(!c||!S.user)return;
  if(isCA()){
    if(S.tab==='home')vCoachHome();
    else if(S.tab==='players')vPlayers();
    else if(S.tab==='calendar')vCalendar();
    else if(S.tab==='matches')vMatches();
    else if(S.tab==='fees')vFees();
  } else if(isPl()){
    if(S.tab==='home')vPlayerHome();
    else if(S.tab==='calendar')vPlayerCal();
    else if(S.tab==='matches')vPlayerMatches();
    else if(S.tab==='notes')vPlayerNotes();
  } else if(isPa()){
    if(S.tab==='home')vParentHome();
    else if(S.tab==='fees')vParentFees();
    else if(S.tab==='calendar')vPlayerCal();
  }
}

// ═══════════════════════════════════════
// COACH / ADMIN VIEWS
// ═══════════════════════════════════════

function vCoachHome(){
  const now=new Date();
  const{s:ts,e:te}=todayRange();
  const{s:ms,e:me}=moRange();

  const todaySess=S.sessions.filter(s=>{
    if(!s.sessionDate)return false;
    const sd=toDate(s.sessionDate);
    return sd>=ts&&sd<=te;
  }).sort((a,b)=>(a.reportingTime||'').localeCompare(b.reportingTime||''));

  const active=todaySess.filter(s=>{
    const sd=toDate(s.sessionDate);
    const rep=new Date(sd);const[rh,rm]=(s.reportingTime||'00:00').split(':');rep.setHours(+rh,+rm);
    const end=new Date(sd);const[eh,em]=(s.endTime||'23:59').split(':');end.setHours(+eh,+em);
    return now>=rep&&now<=end;
  });

  const mAtt=S.attendance.filter(a=>{const d=toDate(a.date);return d>=ms&&d<=me;});
  const attR=mAtt.length?pct(mAtt.filter(x=>x.present).length,mAtt.length):0;
  const paidCt=S.players.filter(p=>pFee(p.id)?.status==='paid').length;
  const ovCt=S.players.filter(p=>pFee(p.id)?.status==='overdue').length;
  const lowAtt=S.players.filter(p=>{const pa=mAtt.filter(a=>a.playerId===p.id);return pa.length>0&&pct(pa.filter(a=>a.present).length,pa.length)<60;});
  const pending=(S.requests||[]).filter(r=>r.status==='pending');

  let h='<div class="pg">';

  // Pending requests
  if(pending.length){
    h+='<div class="card" style="border-color:var(--go);margin-bottom:14px">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--go);letter-spacing:.06em;margin-bottom:12px">📨 PENDING REQUESTS ('+pending.length+')</div>';
    pending.forEach(r=>{
      const p=S.players.find(x=>x.id===r.playerId);
      const rd=toDate(r.date);
      h+='<div class="req-card">';
      h+='<div style="font-weight:600;font-size:14px">'+(p?.name||'?')+'</div>';
      h+='<div style="font-size:12px;color:var(--mu2);margin-top:3px">'+(r.type==='rest-day'?'🛌 Rest Day':'🎾 1-on-1')+' · '+fmtDs(rd)+(r.preferredTime?' · '+r.preferredTime:'')+'</div>';
      if(r.notes) h+='<div style="font-size:12px;color:var(--mu);margin-top:4px;font-style:italic">"'+esc(r.notes)+'"</div>';
      h+='<div class="req-actions">';
      h+='<button class="btn btn-p btn-sm" onclick="approveReq(\''+r.id+'\',\''+r.type+'\',\''+r.playerId+'\')">✓ Approve</button>';
      h+='<button class="btn btn-sm" style="background:var(--red);color:var(--re);border:1px solid var(--re)" onclick="declineReq(\''+r.id+'\')">✕ Decline</button>';
      h+='</div></div>';
    });
    h+='</div>';
  }

  // Active sessions
  active.forEach(s=>{
    const nm=(s.playerIds||[]).map(id=>S.players.find(x=>x.id===id)?.name?.split(' ')[0]||'').filter(Boolean).join(', ');
    h+='<div class="live-banner" onclick="openAtt(\''+s.id+'\')">';
    h+='<div class="live-title"><span class="live-dot"></span>LIVE: '+esc(s.type)+'</div>';
    h+='<div class="live-sub"><strong>'+esc(nm||'All players')+'</strong> · Report <strong>'+s.reportingTime+'</strong> → '+s.endTime+'</div>';
    h+='<div class="live-cta">Tap to mark attendance →</div>';
    h+='</div>';
  });

  // Stats
  h+='<div class="sg">';
  h+='<div class="sc"><div class="sv">'+S.players.length+'</div><div class="sl">Players</div></div>';
  h+='<div class="sc"><div class="sv" style="color:'+(attR>=80?'var(--gr)':'var(--go)')+'">'+attR+'%</div><div class="sl">Attendance</div></div>';
  h+='<div class="sc"><div class="sv" style="color:var(--gr)">'+paidCt+'/'+S.players.length+'</div><div class="sl">Fees Paid</div></div>';
  h+='<div class="sc"><div class="sv">'+S.matches.length+'</div><div class="sl">Matches</div></div>';
  h+='</div>';

  if(ovCt) h+='<div class="al al-r">⚠️ '+ovCt+' player'+(ovCt>1?'s':'')+' have overdue fees</div>';
  if(lowAtt.length) h+='<div class="al al-o">📉 Low attendance: '+lowAtt.map(p=>p.name.split(' ')[0]).join(', ')+'</div>';

  // POTM


  // Today's schedule
  h+='<div class="st">Today\'s Schedule</div>';
  if(todaySess.length){
    todaySess.forEach(s=>h+=sessCard(s,true,true));
  } else {
    h+='<div class="al al-b">📅 No sessions today</div>';
  }

  h+='<div class="st">Quick Actions</div>';
  h+='<button class="btn btn-p btn-w" onclick="openAddSess()">＋ Add Session</button>';
  h+='<div style="height:8px"></div>';
  h+='<button class="btn btn-s btn-w" onclick="sw(\'players\')">View All Players →</button>';
  if(isA()){h+='<div style="height:8px"></div>';h+='<button class="btn btn-s btn-w" onclick="sw(\'fees\')">Manage Fees →</button>';}
  h+='</div>';
  $('app-content').innerHTML=h;
}

// ── SESSION CARD ─────────────────────────
function sessCard(s,showMark,showDelete){
  const nm=(s.playerIds||[]).map(id=>S.players.find(x=>x.id===id)?.name?.split(' ')[0]||'').filter(Boolean);
  const isLate=s.lateEntry;
  let h='<div class="sess-card'+(isLate?' late':'')+(showMark?' live':'')+'"">';
  h+='<div class="sess-top">';
  h+='<div class="sess-info">';
  h+='<span class="b '+(SESS_COL[s.type]||'bm')+'">'+esc(s.type)+'</span>';
  if(isLate) h+='<span class="b bo" style="margin-left:6px">⚠️ LATE</span>';
  h+='<div class="sess-players">'+esc(nm.join(', ')||'All players')+'</div>';
  h+='<div class="sess-time">📍 Report <strong>'+s.reportingTime+'</strong> · '+s.startTime+'–'+s.endTime+'</div>';
  if(s.notes) h+='<div class="sess-note">'+esc(s.notes)+'</div>';
  if(s.sessionNote) h+='<div class="sess-note" style="border-left-color:var(--bl);margin-top:6px">📝 '+esc(s.sessionNote)+'</div>';
  h+='</div>';
  if(isCA()){
    h+='<div class="sess-actions">';
    if(showMark) h+='<button class="btn btn-p btn-sm" onclick="openAtt(\''+s.id+'\')">Mark</button>';
    if(showDelete) h+='<button class="btn-del" onclick="delSess(\''+s.id+'\')">🗑</button>';
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

window.delSess=async function(sid){
  if(!isCA())return;
  if(!confirm('Delete this session?'))return;
  await dbDel('sessions',sid);
  S.sessions=S.sessions.filter(x=>x.id!==sid);
  toast('Session deleted');closeM();render();
};

// ── PLAYERS ──────────────────────────────
function vPlayers(){
  let h='<div class="pg">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h+='<div style="font-family:\'Syne\',sans-serif;font-size:20px;font-weight:800">Players</div>';
  if(isA()) h+='<button class="btn btn-p btn-sm" onclick="openAddPlayer()">＋ Add</button>';
  h+='</div>';

  if(!S.players.length){
    h+='<div class="empty"><div class="empty-ic">👥</div><div class="empty-txt">No players yet.'+(isA()?'<br><br><button class="btn btn-p" onclick="openAddPlayer()">Add First Player</button>':'')+'</div></div>';
  } else {
    h+='<div class="card" style="padding:0;overflow:hidden">';
    S.players.forEach(p=>{
      const att=pAtt(p.id);const fee=pFee(p.id);const col=avc(p.name);
      h+='<div class="player-row" style="padding:12px 14px" onclick="openPlayer(\''+p.id+'\')">';
      h+='<div class="av" style="width:40px;height:40px;background:'+col+'20;color:'+col+'">'+ini(p.name)+'</div>';
      h+='<div style="flex:1;min-width:0">';
      h+='<div class="player-name">'+esc(p.name)+'</div>';
      h+='<div class="player-meta">'+(p.category||'—')+' · Age '+(p.age||'—')+'&nbsp;&nbsp;Att: <span style="color:'+(att>=80?'var(--gr)':att>=60?'var(--go)':'var(--re)')+'">'+att+'%</span></div>';
      h+='</div>';
      h+='<span class="b '+(fee?.status==='paid'?'bg':fee?.status==='overdue'?'br':fee?.status==='pending-verification'?'bb':'bm')+'">'+(fee?.status||'—')+'</span>';
      h+='</div>';
    });
    h+='</div>';

// ── CALENDAR ─────────────────────────────
function calStripes(y,mo,d,playerOnly){
  const colors=[];
  const myId=pid();
  const src=playerOnly?S.sessions.filter(s=>(s.playerIds||[]).includes(myId)):S.sessions;
  src.forEach(s=>{
    if(!s.sessionDate)return;
    const sd=toDate(s.sessionDate);
    if(sd.getDate()===d&&sd.getMonth()===mo&&sd.getFullYear()===y){
      const c=SESS_HEX[s.type]||'#5C5C56';
      if(!colors.includes(c))colors.push(c);
    }
  });
  // Filter tournaments: player/parent sees only their own; coach sees all
  const relevantTours=playerOnly
    ?S.tournaments.filter(t=>t.playerId===myId||S.matches.some(m=>m.tournamentId===t.id&&m.playerId===myId))
    :S.tournaments;
  relevantTours.forEach(t=>{
    if(!t.startDate||!t.endDate)return;
    const ts=toDate(t.startDate);const te=toDate(t.endDate);
    ts.setHours(0,0,0,0);te.setHours(23,59,59,999);
    const day=new Date(y,mo,d);
    if(day>=ts&&day<=te&&!colors.includes('#F5A524'))colors.push('#F5A524');
  });
  if(!colors.length)return'';
  return'<div class="cal-stripes">'+colors.slice(0,4).map(c=>'<div class="cal-stripe" style="background:'+c+'"></div>').join('')+'</div>';
}

function buildCal(playerOnly){
  const now=new Date(),m=S.calMonth;
  const first=new Date(m.getFullYear(),m.getMonth(),1);
  const last=new Date(m.getFullYear(),m.getMonth()+1,0);
  const lbl=m.toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  let h='<div class="cal-nav">';
  h+='<button class="btn btn-s btn-sm" onclick="chMo(-1)">‹</button>';
  h+='<div class="cal-month">'+lbl+'</div>';
  h+='<button class="btn btn-s btn-sm" onclick="chMo(1)">›</button>';
  h+='</div>';
  h+='<div class="cal-grid">';
  h+=['S','M','T','W','T','F','S'].map(d=>'<div class="cal-dl">'+d+'</div>').join('');
  for(let i=0;i<first.getDay();i++) h+='<div class="cal-day off"></div>';
  for(let d=1;d<=last.getDate();d++){
    const isT=d===now.getDate()&&m.getMonth()===now.getMonth()&&m.getFullYear()===now.getFullYear();
    const fn=playerOnly?'openPlayerDay':'openDay';
    h+='<div class="cal-day'+(isT?' today':'')+'\" onclick="'+fn+'('+m.getFullYear()+','+m.getMonth()+','+d+')">';
    h+=d;
    h+=calStripes(m.getFullYear(),m.getMonth(),d,playerOnly);
    h+='</div>';
  }
  h+='</div>';
  // Legend
  h+='<div class="cal-legend">';
  Object.entries(SESS_HEX).forEach(([k,v])=>{h+='<div class="cal-leg-item"><div class="cal-leg-dot" style="background:'+v+'"></div>'+k+'</div>';});
  h+='</div>';
  return h;
}

function vCalendar(){
  const now=new Date();
  const{s:ts,e:te}=todayRange();
  const todaySess=S.sessions.filter(s=>{
    if(!s.sessionDate)return false;
    const sd=toDate(s.sessionDate);
    return sd>=ts&&sd<=te;
  }).sort((a,b)=>(a.reportingTime||'').localeCompare(b.reportingTime||''));
  const upcoming=[...S.sessions].filter(s=>{
    if(!s.sessionDate)return false;
    const sd=toDate(s.sessionDate);return sd>te;
  }).sort((a,b)=>toDate(a.sessionDate)-toDate(b.sessionDate)).slice(0,5);

  let h='<div class="pg">';
  h+=buildCal(false);
  if(todaySess.length){
    h+='<div class="st">Today</div>';
    todaySess.forEach(s=>h+=sessCard(s,true,true));
  }
  if(upcoming.length){
    h+='<div class="st">Upcoming</div>';
    upcoming.forEach(s=>h+=sessCard(s,false,false));
  }
  h+='<button class="btn btn-p btn-w" style="margin-top:14px" onclick="openAddSess()">＋ Add Session</button>';
  h+='</div>';
  $('app-content').innerHTML=h;
}

window.openAtt=function(sid){
  const s=S.sessions.find(x=>x.id===sid);if(!s)return;
  const sd=toDate(s.sessionDate);
  const players=(s.playerIds||[]).map(id=>S.players.find(x=>x.id===id)).filter(Boolean);
  const approvedRests=(S.requests||[]).filter(r=>{
    if(r.status!=='approved'||r.type!=='rest-day')return false;
    const rd=toDate(r.date);
    return sameDay(rd,sd)&&(s.playerIds||[]).includes(r.playerId);
  });

  let h='<div class="mh"></div><div class="mt">Mark Attendance</div>';
  h+='<div class="ms">'+esc(s.type)+' · '+fmtDs(sd)+' · '+s.startTime+'–'+s.endTime+'</div>';

  players.forEach(p=>{
    const col=avc(p.name);
    const rec=S.attendance.find(a=>a.playerId===p.id&&a.sessionId===sid);
    const cur=rec?.present;
    const onRest=approvedRests.some(r=>r.playerId===p.id);
    h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bdr)">';
    h+='<div style="display:flex;align-items:center;gap:10px">';

    h+='<div><div style="font-weight:600;font-size:14px">'+esc(p.name.split(' ')[0])+'</div>';
    if(onRest) h+='<div style="font-size:11px;color:var(--mu)">🛌 Approved rest</div>';
    h+='</div></div>';
    if(onRest){
      h+='<span class="b bm">On Rest</span>';
    } else {
      h+='<div style="display:flex;gap:6px">';
      h+='<button class="att-btn'+(cur===true?' present':'')+'" id="pb-'+p.id+'" onclick="markAtt(\''+sid+'\',\''+p.id+'\',true)">✓</button>';
      h+='<button class="att-btn'+(cur===false?' absent':'')+'" id="ab-'+p.id+'" onclick="markAtt(\''+sid+'\',\''+p.id+'\',false)">✗</button>';
      h+='</div>';
    }
    h+='</div>';
  });

  h+='<div class="fg" style="margin-top:14px"><label class="fl">Session Notes</label><textarea class="fi fta" id="sn-'+sid+'\">'+(s.sessionNote||'')+'</textarea></div>';
  h+='<button class="btn btn-p btn-w" style="margin-top:4px" onclick="saveAttNote(\''+sid+'\')">Save & Close</button>';
  openM(h);
};

window.markAtt=async function(sid,plId,present){
  const s=S.sessions.find(x=>x.id===sid);
  const sd=s?.sessionDate?Timestamp.fromDate(toDate(s.sessionDate)):null;
  const ex=S.attendance.find(a=>a.playerId===plId&&a.sessionId===sid);
  if(ex) await dbUpd('attendance',ex.id,{present,markedBy:S.user.name});
  else await dbAdd('attendance',{playerId:plId,sessionId:sid,date:sd,present,markedBy:S.user.name});
  const pb=$('pb-'+plId),ab=$('ab-'+plId);
  if(pb){pb.className='att-btn'+(present?' present':'');}
  if(ab){ab.className='att-btn'+(present===false?' absent':'');}
};

  h+='<div style="font-family:\'Syne\',sans-serif;font-size:20px;font-weight:800">Tournaments</div>';

window.openPlayerDay=function(y,mo,d){
  const id=pid();
  const sess=S.sessions.filter(s=>{
    if(!s.sessionDate)return false;
    const sd=toDate(s.sessionDate);
    return sd.getDate()===d&&sd.getMonth()===mo&&sd.getFullYear()===y&&(s.playerIds||[]).includes(id);
  });
  const tours=S.tournaments.filter(t=>{
    if(!t.startDate||!t.endDate)return false;
    // Only show THIS player's tournaments
    if(t.playerId!==id&&!S.matches.some(m=>m.tournamentId===t.id&&m.playerId===id))return false;
    const ts=toDate(t.startDate);const te=toDate(t.endDate);
    ts.setHours(0,0,0,0);te.setHours(23,59,59,999);
    const day=new Date(y,mo,d);return day>=ts&&day<=te;

  const lbl=new Date(y,mo,d).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  let h='<div class="mh"></div><div class="mt">'+lbl+'</div><div style="margin-top:14px">';

  openM(h);

    (!isR?'<div class="fg"><label class="fl">Preferred Time</label><input class="fi" id="rq-tm" type="time" value="08:00"></div>':'')+
    '<div class="fg"><label class="fl">Reason (optional)</label><textarea class="fi fta" id="rq-nt" placeholder="'+(isR?'Why do you need rest?':'What to work on?')+'"></textarea></div>'+
    '<div class="ma"><button class="btn btn-s" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveReq(\''+type+'\')">Send Request</button></div>');
};

window.saveReq=async function(type){
  const ds=$('rq-dt')?.value;if(!ds){toast('Pick a date');return;}
  const id=pid();
  const data={type,playerId:id,date:Timestamp.fromDate(new Date(ds)),status:'pending',notes:$('rq-nt')?.value||'',requestedBy:S.user.name};
  if(type==='1-on-1')data.preferredTime=$('rq-tm')?.value||'08:00';
  const ref=await dbAdd('requests',data);
  if(!S.requests)S.requests=[];
  S.requests.push({id:ref.id,...data});
  toast('Request sent ✓');closeM();render();
};

window.approveReq=async function(rid,type,plid){
  const r=(S.requests||[]).find(x=>x.id===rid);if(!r)return;
  await dbUpd('requests',rid,{status:'approved',approvedBy:S.user.name});
  if(type==='1-on-1'){
    const rd=toDate(r.date);
    const ref=await dbAdd('sessions',{type:'1-on-1',sessionDate:Timestamp.fromDate(rd),reportingTime:r.preferredTime||'08:00',startTime:r.preferredTime||'08:00',endTime:'09:00',playerIds:[plid],notes:r.notes||'1-on-1 request',createdBy:S.user.name,lateEntry:false,attendanceMarked:false});
    S.sessions.push({id:ref.id,type:'1-on-1',sessionDate:Timestamp.fromDate(rd),reportingTime:r.preferredTime||'08:00',startTime:r.preferredTime||'08:00',endTime:'09:00',playerIds:[plid],notes:r.notes||''});
  }
  S.requests=(S.requests||[]).map(x=>x.id===rid?{...x,status:'approved'}:x);
  toast('Approved ✓');buildNav();render();
};

window.declineReq=async function(rid){
  await dbUpd('requests',rid,{status:'declined',declinedBy:S.user.name});
  S.requests=(S.requests||[]).map(x=>x.id===rid?{...x,status:'declined'}:x);
  toast('Declined');buildNav();render();
};

window.parPay=async function(id){
  const file=$('par-receipt')?.files?.[0];
  const note=$('par-note')?.value?.trim()||'';
  let receiptUrl='';
  if(file){receiptUrl=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);});}
  await dbAdd('fees',{playerId:id,amount:0,status:'pending-verification',notes:note||'Awaiting verification',receiptUrl,updatedBy:'Parent',updatedAt:serverTimestamp()});
  toast('Payment submitted ✓');
  if($('par-receipt'))$('par-receipt').value='';
  if($('par-note'))$('par-note').value='';
  render();
};

// ═══════════════════════════════════════
// POTM
// ═══════════════════════════════════════

function calcPOTM(){
  if(!S.players.length)return null;
  const{s:ms,e:me}=moRange();
  const scores=S.players.map(p=>{
    const att=S.attendance.filter(a=>{const d=toDate(a.date);return a.playerId===p.id&&d>=ms&&d<=me;});
    const attPct=att.length?pct(att.filter(x=>x.present).length,att.length):0;
    const logs=[...S.skillLogs.filter(x=>x.playerId===p.id)].sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    let skD=50;
    if(logs.length>=2){const pr=logs[logs.length-2].skills||{},cu=logs[logs.length-1].skills||{};const pa=Object.values(pr).reduce((a,b)=>a+b,0)/(Object.values(pr).length||1),ca=Object.values(cu).reduce((a,b)=>a+b,0)/(Object.values(cu).length||1);skD=Math.min(100,Math.max(0,50+(ca-pa)*5));}
    const mM=S.matches.filter(m=>{const d=toDate(m.createdAt);return m.playerId===p.id&&d>=ms&&d<=me&&(m.result==='W'||m.result==='L');});
    const wPct=mM.length?pct(mM.filter(m=>m.result==='W').length,mM.length):0;
    const score=Math.min(100,Math.max(0,Math.round((attPct+skD+wPct)/3)));
    return{id:p.id,name:p.name,score};
  }).sort((a,b)=>b.score-a.score);
  return scores[0]||null;
}

function openM(html){
  closeM();
  const ov=document.createElement('div');ov.className='mo';ov.id='mo';
  ov.onclick=e=>{if(e.target===ov)closeM();};
  const mb=document.createElement('div');mb.className='mb';mb.innerHTML=html;
  ov.appendChild(mb);document.body.appendChild(ov);
  let sy=0;
  mb.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
  mb.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-sy>80&&mb.scrollTop<=0)closeM();},{passive:true});
}
window.closeM=function(){const o=$('mo');if(o)o.remove();};

// ── INIT ─────────────────────────────────
async function init(){
  try{
    await signInAnonymously(auth);

    // Load players FIRST before showing login
    const snap=await getDocs(collection(db,'players'));
    S.players=snap.docs.map(d=>({id:d.id,...d.data()}));

    // Then start listeners
    listen();

    // Check saved session
    try{
      const saved=localStorage.getItem('yu_user');
      if(saved){
        const u=JSON.parse(saved);
        let valid=false;
        if(u.type==='admin') valid=true;
        else if(u.type==='coach') valid=!!COACHES.find(c=>c.id===u.id);
        else if(u.type==='player'||u.type==='parent') valid=!!S.players.find(p=>p.id===u.playerId);
        if(valid){
          S.user=u;
          $('screen-load').style.display='none';
          $('screen-app').style.display='flex';
          $('hdr-user').textContent=S.user.name;
          buildNav();S.tab='home';render();
          return;
        } else {
          localStorage.removeItem('yu_user');
        }
      }
    }catch(e){}

    $('screen-load').style.display='none';
    $('screen-login').style.display='block';

  }catch(e){
    $('screen-load').innerHTML='<div style="color:var(--re);text-align:center;padding:24px;max-width:300px"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-weight:700;margin-bottom:8px">Connection Failed</div><div style="font-size:13px;color:var(--mu2);line-height:1.5">'+e.message+'</div></div>';
  }
}

init();

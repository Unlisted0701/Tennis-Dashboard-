<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0A0A0A}
body{font-family:'DM Sans',system-ui,sans-serif;color:#F0EDE8;overscroll-behavior:none}
*{scrollbar-width:none}*::-webkit-scrollbar{display:none}
:root{
  --bg:#0A0A0A;--sf:#141414;--card:#1C1C1C;--c2:#222;
  --bd:#282828;--bd2:#383838;
  --tx:#F0EDE8;--mu:#5A5A54;--mu2:#8A8A82;
  --gr:#4ADE80;--grd:#0C2418;--grm:#163824;
  --go:#FBBF24;--god:#261C04;
  --bl:#60A5FA;--bld:#0C1C38;
  --re:#F87171;--red:#281010;
  --pu:#C084FC;--pud:#1C0C2C;
  --nav:64px;--hdr:56px;--safe:env(safe-area-inset-bottom,0px)
}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}
#hdr{height:var(--hdr);background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:50}
.logo{font-family:'DM Serif Display',serif;font-size:20px}.logo em{color:var(--gr);font-style:normal}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav) + var(--safe) + 20px)}
#nav{height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);background:var(--sf);border-top:1px solid var(--bd);display:flex;flex-shrink:0;z-index:50}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--mu);font-family:inherit;cursor:pointer;padding:8px 4px;transition:color .15s}
.ni.on{color:var(--gr)}.ni-ic{font-size:22px;line-height:1}.ni-lb{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
@media(min-width:768px){
  #app{flex-direction:row}#hdr{display:none}
  #nav{width:220px;height:100vh;flex-direction:column;border-top:none;border-right:1px solid var(--bd);padding:0;align-items:stretch;justify-content:flex-start}
  #nav-logo{padding:24px 20px 16px;font-family:'DM Serif Display',serif;font-size:22px;border-bottom:1px solid var(--bd);margin-bottom:8px;display:block!important}
  #nav-logo em{color:var(--gr);font-style:normal}
  #nav-bot{margin-top:auto;padding:16px 12px;border-top:1px solid var(--bd)}
  .ni{flex-direction:row;justify-content:flex-start;gap:12px;padding:12px 18px;border-radius:10px;margin:2px 10px;min-height:unset;flex:none;width:auto}
  .ni-ic{font-size:18px}.ni-lb{font-size:13px;font-weight:600;letter-spacing:0;text-transform:none}.ni.on{background:var(--grd);color:var(--gr)}
  #content{flex:1;padding-bottom:24px}.pg{max-width:820px;padding:28px 32px}
  .mb{border-radius:18px;max-width:560px;margin:auto;max-height:85vh}.mo{align-items:center;padding:24px}
  .sg{grid-template-columns:repeat(4,1fr)!important}
}
.pg{padding:16px;animation:pgIn .18s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:10px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px}
.sv{font-family:'DM Serif Display',serif;font-size:28px;line-height:1;margin-bottom:3px}
.sl{font-size:10px;color:var(--mu);letter-spacing:.06em;text-transform:uppercase}
.st{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin:18px 0 10px}.st:first-child{margin-top:0}
.b{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.03em}
.bg{color:var(--gr);background:var(--grd)}.bb{color:var(--bl);background:var(--bld)}.br{color:var(--re);background:var(--red)}.bo{color:var(--go);background:var(--god)}.bp{color:var(--pu);background:var(--pud)}.bm{color:var(--mu2);background:var(--c2)}
.al{border-radius:12px;padding:11px 13px;margin-bottom:8px;font-size:13px;line-height:1.5;display:flex;gap:9px;align-items:flex-start}
.al-r{background:var(--red);color:var(--re);border:1px solid #3D1818}.al-g{background:var(--grd);color:var(--gr);border:1px solid #133020}.al-o{background:var(--god);color:var(--go);border:1px solid #3D2C08}.al-b{background:var(--bld);color:var(--bl);border:1px solid #0C2040}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .12s}
.btn:active{opacity:.72}.btn-p{background:var(--gr);color:#000}.btn-s{background:var(--c2);color:var(--mu2);border:1px solid var(--bd2)}.btn-d{background:var(--red);color:var(--re);border:1px solid #3D1818}.btn-w{width:100%}.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.fg{margin-bottom:14px}.fl{display:block;font-size:10px;color:var(--mu);letter-spacing:.07em;font-weight:700;margin-bottom:7px;text-transform:uppercase}

.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.mb{background:var(--sf);border-radius:22px 22px 0 0;width:100%;max-height:92dvh;max-height:92vh;overflow-y:auto;padding:18px 16px calc(22px + var(--safe));animation:mbIn .22s ease}
@keyframes mbIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{width:34px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 18px}
.mt{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:3px}.ms{font-size:13px;color:var(--mu);margin-bottom:18px}
.ma{display:flex;gap:10px;margin-top:18px}.ma .btn{flex:1}
.pc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s}.pc:active{border-color:var(--bd2)}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:15px;flex-shrink:0}
.sk-row{margin-bottom:12px}.sk-hd{display:flex;justify-content:space-between;margin-bottom:5px}
.sk-tr{height:3px;background:var(--bd2);border-radius:2px}.sk-fl{height:3px;border-radius:2px;transition:width .4s ease}
input[type=range]{width:100%;margin-top:8px;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--bd2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gr);cursor:pointer}
.att-w{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.ad{width:11px;height:11px;border-radius:50%;transition:transform .12s}.ad.P{background:var(--gr)}.ad.A{background:var(--re)}.ad.N{background:var(--bd2)}
.wl{height:5px;border-radius:3px;background:var(--bd2);overflow:hidden;margin:6px 0}.wl-f{height:100%;border-radius:3px;background:var(--gr);transition:width .5s ease}
.sb{background:var(--grm);border:1px solid var(--gr);border-radius:14px;padding:14px;margin-bottom:12px;cursor:pointer}
.sb-t{font-size:14px;font-weight:700;color:var(--gr);margin-bottom:3px}.sb-s{font-size:12px;color:var(--mu2)}.sb-a{font-size:12px;color:var(--gr);font-weight:600;margin-top:7px}
.me{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:8px}
.me-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.cal-dl{font-size:10px;color:var(--mu);text-align:center;padding:4px 0;font-weight:700}
.cal-d{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--mu2);cursor:pointer;position:relative;transition:background .12s}
.cal-d:not(.om):hover{background:var(--c2)}.cal-d:not(.om):active{background:var(--bd2)}
.cal-d.today{background:var(--grd);color:var(--gr);font-weight:700}
.cal-d.hs::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--gr)}
.cal-d.om{color:var(--bd2);pointer-events:none}
.ne{background:var(--c2);border-left:3px solid var(--gr);border-radius:0 10px 10px 0;padding:11px;margin-bottom:8px}
.ne-m{font-size:11px;color:var(--mu);margin-bottom:5px}.ne-t{font-size:13px;line-height:1.5}
.tc{background:var(--card);border:1px solid var(--bd);border-radius:14px;margin-bottom:10px;overflow:hidden}
.th{padding:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px}
.tb{border-top:1px solid var(--bd);padding:12px}
.chv{font-size:11px;color:var(--mu);transition:transform .2s;flex-shrink:0}.chv.op{transform:rotate(180deg)}
.fr-row{display:flex;justify-content:space-between;align-items:center;padding:13px;border-bottom:1px solid var(--bd)}.fr-row:last-child{border-bottom:none}
.potm{background:linear-gradient(135deg,var(--god) 0%,var(--card) 100%);border:1px solid #3D2C08;border-radius:14px;padding:14px;margin-bottom:10px}
.div{height:1px;background:var(--bd);margin:14px 0}
.empty{text-align:center;padding:40px 20px;color:var(--mu);font-size:14px}.empty-ic{font-size:38px;margin-bottom:12px}
.sn{font-size:13px;font-weight:700;color:var(--tx);margin-top:7px;padding:8px 10px;background:var(--c2);border-radius:8px}
#login{position:fixed;inset:0;background:var(--bg);display:none;align-items:flex-start;justify-content:center;padding:20px;z-index:100;overflow-y:auto}
.lbox{width:100%;max-width:380px;background:var(--sf);border:1px solid var(--bd);border-radius:22px;padding:28px 22px;margin-top:20px}
.l-logo{font-family:'DM Serif Display',serif;font-size:30px;text-align:center;margin-bottom:3px}.l-logo em{color:var(--gr);font-style:normal}
.l-sub{font-size:13px;color:var(--mu);text-align:center;margin-bottom:24px}
.lo{padding:11px 14px;border-radius:11px;border:1px solid var(--bd);background:transparent;color:var(--mu2);font-size:14px;font-weight:500;cursor:pointer;text-align:left;font-family:inherit;width:100%;transition:all .15s;margin-bottom:7px;display:block}
.lo.on{border-color:var(--gr);background:var(--grd);color:var(--gr)}
.lpin{width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--bd);background:var(--card);color:var(--tx);font-size:22px;letter-spacing:.5em;font-family:monospace;outline:none;transition:border-color .15s;text-align:center}
.lpin:focus{border-color:var(--gr)}.lpin.err{border-color:var(--re)}
.lerr{font-size:12px;color:var(--re);margin-top:5px;display:none}
.lbtn{width:100%;padding:14px;border-radius:11px;border:none;background:var(--gr);color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;transition:opacity .12s}.lbtn:active{opacity:.8}
.ldemo{font-size:11px;color:var(--mu);text-align:center;margin-top:14px;line-height:1.7}
#toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--c2);border:1px solid var(--bd2);border-radius:20px;padding:9px 18px;font-size:13px;color:var(--tx);z-index:400;white-space:nowrap;pointer-events:none;display:none}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:18px}
.spin{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--gr);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#ibanner{position:fixed;bottom:calc(var(--nav) + var(--safe) + 10px);left:14px;right:14px;z-index:90;background:var(--grm);border:1px solid var(--gr);border-radius:14px;padding:12px 14px;display:none;align-items:center;gap:10px}
.ib-t{flex:1;font-size:13px}.ib-btn{font-size:12px;font-weight:700;color:var(--gr);background:var(--grd);border:1px solid var(--gr);border-radius:8px;padding:6px 12px;cursor:pointer;white-space:nowrap;font-family:inherit}.ib-x{font-size:20px;color:var(--mu);cursor:pointer;line-height:1;flex-shrink:0}
</style>
</head>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,doc,getDocs,setDoc,addDoc,updateDoc,deleteDoc,onSnapshot,serverTimestamp,Timestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
const FC={apiKey:"AIzaSyDeO6hr8_BA_kVidh4Lyi_fDZXdHNSw-nI",authDomain:"tennis-dashboard-6d35b.firebaseapp.com",projectId:"tennis-dashboard-6d35b",storageBucket:"tennis-dashboard-6d35b.firebasestorage.app",messagingSenderId:"603005850959",appId:"1:603005850959:web:30e844d4cb9b80f611213a"};
const app=initializeApp(FC),db=getFirestore(app),auth=getAuth(app);
const ADMIN_PIN='0000';
const COACHES=[{id:'yash',name:'Yash Deshmukh',pin:'1111'},{id:'anup',name:'Anup Shinde',pin:'2222'},{id:'milind',name:'Milind Nagarkar',pin:'3333'}];
const CIRCUITS=['AITA','MSLTA','PMDTA','Other'],ROUNDS=['R1','R2','R3','QF','SF','F','RR'];
const SESS_T=['Tennis Practice','1-on-1','Fitness','Mental Health','Tournament','Rest Day'];
const CATS=['U10','U12','U14','U16','U18','Open'],SKILLS=['Forehand','Backhand','Serve','Footwork','Volleys'];
const AVC=['#4ADE80','#60A5FA','#FBBF24','#F87171','#C084FC','#FB923C','#34D399','#F472B6','#A78BFA','#38BDF8'];
const SCC={'Tennis Practice':'bg','1-on-1':'bb','Fitness':'bo','Mental Health':'bp','Tournament':'bo','Rest Day':'bm'};
const S={user:null,tab:'overview',players:[],sessions:[],tournaments:[],matches:[],fees:[],notes:[],skillLogs:[],attendance:[],potm:[],calMonth:new Date(),openTour:null,unsubs:[]};
const $=id=>document.getElementById(id);
function toast(m,ms=2400){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',ms);}
function fmtD(ts){if(!ts)return'—';const d=ts?.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function fmtDs(ts){if(!ts)return'—';const d=ts?.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
function toTs(v){return v?Timestamp.fromDate(new Date(v)):null;}
function ini(n){return(n||'').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);}
function avc(n){let h=0;for(const c of(n||''))h=(h*31+c.charCodeAt(0))%AVC.length;return AVC[h];}
function skc(v){return v>=75?'var(--gr)':v>=50?'var(--go)':'var(--mu2)';}
function pct(n,d){return d===0?0:Math.round(n/d*100);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isA(){return S.user?.type==='admin';}function isC(){return S.user?.type==='coach';}
function isCA(){return isA()||isC();}function isPl(){return S.user?.type==='player';}function isPa(){return S.user?.type==='parent';}
function pid(){return S.user?.playerId;}
const dbAdd=(c,d)=>addDoc(collection(db,c),{...d,createdAt:serverTimestamp()});
const dbSet=(c,id,d)=>setDoc(doc(db,c,id),d,{merge:true});
const dbUpd=(c,id,d)=>updateDoc(doc(db,c,id),d);
const dbDel=(c,id)=>deleteDoc(doc(db,c,id));
function listen(){const cols=['players','sessions','tournaments','matches','fees','notes','skillLogs','attendance','potm'];S.unsubs=cols.map(c=>onSnapshot(collection(db,c),snap=>{S[c]=snap.docs.map(d=>({id:d.id,...d.data()}));if(S.user)render();}));}
function unlisten(){S.unsubs.forEach(u=>u());S.unsubs=[];}
function pAtt(id){const a=S.attendance.filter(x=>x.playerId===id);return a.length?pct(a.filter(x=>x.present).length,a.length):0;}
function pWL(id){const m=S.matches.filter(x=>x.playerId===id&&(x.result==='W'||x.result==='L'));return{w:m.filter(x=>x.result==='W').length,l:m.filter(x=>x.result==='L').length};}
function pSkills(id){const l=[...S.skillLogs.filter(x=>x.playerId===id)].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));return l[0]?.skills||{Forehand:50,Backhand:50,Serve:50,Footwork:50,Volleys:50};}
function moRange(){const n=new Date();return{s:new Date(n.getFullYear(),n.getMonth(),1),e:new Date(n.getFullYear(),n.getMonth()+1,0,23,59,59)};}
function pFee(id){return[...S.fees.filter(x=>x.playerId===id)].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))[0]||null;}
function lateUp(m,t){if(!t?.endDate||!m?.createdAt)return false;const ed=t.endDate?.toDate?t.endDate.toDate():new Date(t.endDate||0);const up=m.createdAt?.toDate?m.createdAt.toDate():new Date(m.createdAt||0);return up>ed||!!m.lateUpload;}
let LT=null,LSID=null;
window.selT=function(b){
  document.querySelectorAll('.lo').forEach(x=>x.classList.remove('on'));b.classList.add('on');LT=b.dataset.t;LSID=null;
  $('lpin').value='';$('lerr').style.display='none';$('lpin').classList.remove('err');
  const sub=$('lsub'),ls=$('lsub-ls');
  if(LT==='coach'){$('lsub-lb').textContent='SELECT COACH';ls.innerHTML=COACHES.map(c=>'<button class="lo" data-id="'+c.id+'" onclick="selS(this)">'+c.name+'</button>').join('');sub.style.display='block';}
  else if(LT==='player'||LT==='parent'){
    $('lsub-lb').textContent=LT==='player'?'SELECT PLAYER':'SELECT YOUR CHILD';
    ls.innerHTML=S.players.length?'<select class="fs" id="lsel" style="width:100%" onchange="LSID=this.value"><option value="">— Choose —</option>'+S.players.map(p=>'<option value="'+p.id+'">'+esc(p.name)+' ('+( p.category||'—')+', Age '+(p.age||'—')+')</option>').join('')+'</select>':'<div style="font-size:13px;color:var(--mu);padding:6px 0">No players yet — ask admin.</div>';
    sub.style.display='block';
  }else sub.style.display='none';
};
window.selS=function(b){document.querySelectorAll('#lsub-ls .lo').forEach(x=>x.classList.remove('on'));b.classList.add('on');LSID=b.dataset.id;};
window.doLogin=function(){
  const pin=$('lpin').value.trim();
  const bad=()=>{$('lerr').style.display='block';$('lpin').classList.add('err');$('lpin').value='';};
  $('lerr').style.display='none';$('lpin').classList.remove('err');
  if(!LT){toast('Select your role');return;}
  if(LT==='admin'){if(pin!==ADMIN_PIN){bad();return;}S.user={type:'admin',name:'Admin',id:'admin'};}
  else if(LT==='coach'){if(!LSID){toast('Select a coach');return;}const c=COACHES.find(x=>x.id===LSID);if(!c||pin!==c.pin){bad();return;}S.user={type:'coach',name:c.name,id:c.id};}
  else if(LT==='player'){const sel=$('lsel');if(sel&&sel.value)LSID=sel.value;if(!LSID){toast('Select your name');return;}const p=S.players.find(x=>x.id===LSID);if(!p||pin!==p.playerPin){bad();return;}S.user={type:'player',name:p.name,id:'pl_'+p.id,playerId:p.id};}
  else if(LT==='parent'){const sel=$('lsel');if(sel&&sel.value)LSID=sel.value;if(!LSID){toast('Select your child');return;}const p=S.players.find(x=>x.id===LSID);if(!p||pin!==p.parentPin){bad();return;}S.user={type:'parent',name:'Parent of '+p.name,id:'pa_'+p.id,playerId:p.id};}
  try{localStorage.setItem('td_u',JSON.stringify(S.user));}catch(e){}
  $('login').style.display='none';$('app').style.display='flex';$('hdr-u').textContent=S.user.name;buildNav();S.tab='overview';render();
};
window.doOut=function(){unlisten();S.user=null;S.tab='overview';try{localStorage.removeItem('td_u');}catch(e){}LT=null;LSID=null;$('lpin').value='';$('lerr').style.display='none';document.querySelectorAll('.lo').forEach(b=>b.classList.remove('on'));$('lsub').style.display='none';$('app').style.display='none';$('login').style.display='flex';listen();};
function buildNav(){
  let tabs=[];
  if(isCA())tabs=[{id:'overview',ic:'🏠',lb:'Home'},{id:'players',ic:'👥',lb:'Players'},{id:'matches',ic:'🏆',lb:'Matches'},{id:'calendar',ic:'📅',lb:'Schedule'},{id:'fees',ic:'💰',lb:'Fees'}];
  else if(isPl())tabs=[{id:'overview',ic:'📊',lb:'Stats'},{id:'matches',ic:'🎾',lb:'Matches'},{id:'calendar',ic:'📅',lb:'Schedule'},{id:'notes',ic:'📝',lb:'Notes'}];
  else if(isPa())tabs=[{id:'overview',ic:'📊',lb:'Overview'},{id:'fees',ic:'💰',lb:'Fees'},{id:'calendar',ic:'📅',lb:'Schedule'}];
  const desk=window.innerWidth>=768;
  let h='';
  if(desk)h+='<div id="nav-logo" style="display:block">Tennis Dashboard<em>.</em></div>';
  h+=tabs.map(t=>'<button class="ni'+(S.tab===t.id?' on':'')+'" onclick="sw(\''+t.id+'\')"><span class="ni-ic">'+t.ic+'</span><span class="ni-lb">'+t.lb+'</span></button>').join('');
  if(desk)h+='<div id="nav-bot"><div style="font-size:12px;color:var(--mu2);margin-bottom:8px;padding:0 6px">'+esc(S.user?.name||'')+'</div><button class="btn btn-s btn-w btn-sm" onclick="doOut()">Sign out</button></div>';
  $('nav').innerHTML=h;
}
window.sw=function(t){S.tab=t;buildNav();render();};
window.addEventListener('resize',()=>{if(S.user)buildNav();});
function render(){
  if(!$('content')||!S.user)return;
  if(isCA()){if(S.tab==='overview')vHome();else if(S.tab==='players')vPlayers();else if(S.tab==='matches')vMatches();else if(S.tab==='calendar')vCal();else if(S.tab==='fees')vFees();}
  else if(isPl()){if(S.tab==='overview')vStats();else if(S.tab==='matches')vMyMatches();else if(S.tab==='calendar')vMyCal();else if(S.tab==='notes')vMyNotes();}
  else if(isPa()){if(S.tab==='overview')vStats();else if(S.tab==='fees')vParFees();else if(S.tab==='calendar')vMyCal();}
}
function vHome(){
  const now=new Date();
  const active=S.sessions.filter(s=>{if(!s.sessionDate)return false;const sd=s.sessionDate?.toDate?s.sessionDate.toDate():new Date(s.sessionDate);const rep=new Date(sd);const[rh,rm]=(s.reportingTime||'00:00').split(':');rep.setHours(+rh,+rm);const end=new Date(sd);const[eh,em]=(s.endTime||'23:59').split(':');end.setHours(+eh,+em);return now>=rep&&now<=end;});
  const{s:ms,e:me}=moRange();
  const mAtt=S.attendance.filter(a=>{const d=a.date?.toDate?a.date.toDate():new Date(a.date||0);return d>=ms&&d<=me;});
  const attR=mAtt.length?pct(mAtt.filter(x=>x.present).length,mAtt.length):0;
  const paidCt=S.players.filter(p=>pFee(p.id)?.status==='paid').length;
  const ovCt=S.players.filter(p=>pFee(p.id)?.status==='overdue').length;
  const pendCt=S.players.filter(p=>pFee(p.id)?.status==='pending-verification').length;
  const potm=calcPOTM();
  const recent=[...S.matches].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).slice(0,5);
  const lowAtt=S.players.filter(p=>{const pa=mAtt.filter(a=>a.playerId===p.id);return pa.length>0&&pct(pa.filter(a=>a.present).length,pa.length)<60;});
  let h='<div class="pg">';
  active.forEach(s=>{const nm=(s.playerIds||[]).map(id=>S.players.find(x=>x.id===id)?.name?.split(' ')[0]||'').filter(Boolean).join(', ');h+='<div class="sb" onclick="openAtt(\''+s.id+'\')"><div class="sb-t">🟢 Active: '+esc(s.type)+'</div><div class="sb-s"><strong>'+esc(nm)+'</strong> · Report: <strong>'+s.reportingTime+'</strong> – End: '+s.endTime+'</div><div class="sb-a">Tap to mark attendance →</div></div>';});
  h+='<div class="sg"><div class="sc"><div class="sv">'+S.players.length+'</div><div class="sl">Players</div></div><div class="sc"><div class="sv" style="color:'+(attR>=80?'var(--gr)':'var(--go)')+'">'+attR+'%</div><div class="sl">Avg Attend.</div></div><div class="sc"><div class="sv" style="color:var(--gr)">'+paidCt+'/'+S.players.length+'</div><div class="sl">Fees Paid</div></div><div class="sc"><div class="sv">'+S.matches.length+'</div><div class="sl">Matches</div></div></div>';
  if(ovCt)h+='<div class="al al-r">⚠️ '+ovCt+' player'+(ovCt>1?'s':'')+' with overdue fees</div>';
  if(pendCt)h+='<div class="al al-b">📤 '+pendCt+' payment'+(pendCt>1?'s':'')+' pending verification</div>';
  if(lowAtt.length)h+='<div class="al al-o">📉 Low attendance: '+lowAtt.map(p=>p.name.split(' ')[0]).join(', ')+'</div>';
  if(potm)h+='<div class="potm"><div style="font-size:10px;color:var(--go);font-weight:700;letter-spacing:.08em;margin-bottom:8px">🏅 PLAYER OF THE MONTH</div><div style="font-family:\'DM Serif Display\',serif;font-size:22px">'+esc(potm.name)+'</div><div style="font-size:12px;color:var(--mu);margin-top:4px">Score '+potm.score+'/100</div></div>';
  if(recent.length){h+='<div class="st">Recent Matches</div>';recent.forEach(m=>{const p=S.players.find(x=>x.id===m.playerId),t=S.tournaments.find(x=>x.id===m.tournamentId);h+='<div class="me"><div class="me-top"><div><div style="font-weight:600;font-size:14px">'+(p?.name||'?')+'</div><div style="font-size:12px;color:var(--mu);margin-top:2px">'+(t?.name||'—')+' · '+(m.round||'')+'</div><div style="font-size:12px;color:var(--mu)">'+esc(m.scoreDisplay||'')+'</div></div><span class="b '+(m.result==='W'?'bg':'br')+'">'+(m.result==='W'?'WIN':'LOSS')+'</span></div></div>';});}
  h+='<div class="st">Quick Actions</div><button class="btn btn-p btn-w" onclick="openAddSess()">＋ Add Practice Session</button><div style="height:8px"></div><button class="btn btn-s btn-w" onclick="sw(\'players\')">View All Players →</button>';
  if(isA())h+='<div style="height:8px"></div><button class="btn btn-s btn-w" onclick="sw(\'fees\')">Manage Fees →</button>';
  h+='</div>';$('content').innerHTML=h;
}
function vPlayers(){
  const sorted=[...S.players].sort((a,b)=>a.name.localeCompare(b.name));
  let h='<div class="pg"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-family:\'DM Serif Display\',serif;font-size:20px">'+S.players.length+' Players</div>'+(isA()?'<button class="btn btn-p btn-sm" onclick="openAddPl()">＋ Add</button>':'')+'</div>';
  if(!sorted.length)h+='<div class="empty"><div class="empty-ic">👥</div>No players yet'+(isA()?'<br><br><button class="btn btn-p" onclick="openAddPl()">Add First Player</button>':'')+'</div>';
  else sorted.forEach(p=>{const col=avc(p.name),att=pAtt(p.id),wl=pWL(p.id),fee=pFee(p.id);h+='<div class="pc" onclick="openProf(\''+p.id+'\')" ><div class="av" style="background:'+col+'20;color:'+col+'">'+ini(p.name)+'</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.name)+'</div><div style="font-size:12px;color:var(--mu);margin-top:2px">'+(p.category||'—')+' · Age '+(p.age||'—')+' · '+wl.w+'W '+wl.l+'L</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0"><span class="b bm">'+att+'%</span><span class="b '+(fee?.status==='paid'?'bg':fee?.status==='overdue'?'br':'bo')+'">'+(fee?.status||'—')+'</span></div></div>';});
  h+='</div>';$('content').innerHTML=h;
}
window.openProf=function(id){
  const p=S.players.find(x=>x.id===id);if(!p)return;
  const col=avc(p.name),att=pAtt(id),wl=pWL(id),tot=wl.w+wl.l,wp=tot?pct(wl.w,tot):0;
  const sk=pSkills(id),avgSk=Math.round(Object.values(sk).reduce((a,b)=>a+b,0)/5);
  const notes=[...S.notes.filter(n=>n.playerId===id)].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const slogs=[...S.skillLogs.filter(x=>x.playerId===id)].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const fee=pFee(id),now=new Date(),dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const{s:ms,e:me}=moRange();
  const moA=S.attendance.filter(a=>{const d=a.date?.toDate?a.date.toDate():new Date(a.date||0);return a.playerId===id&&d>=ms&&d<=me;});
  let h='<div class="mh"></div>';
  h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">';
  h+='<button onclick="closeM()" style="background:var(--c2);border:1px solid var(--bd2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--mu2);flex-shrink:0">‹</button>';
  h+='<div class="av" style="width:52px;height:52px;font-size:18px;background:'+col+'20;color:'+col+'">'+ini(p.name)+'</div>';
  h+='<div><div style="font-family:\'DM Serif Display\',serif;font-size:20px">'+esc(p.name)+'</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px"><span class="b bb">'+(p.category||'—')+'</span><span class="b bm">Age '+(p.age||'—')+'</span>'+(p.parentName?'<span class="b bm">👨‍👩‍👧 '+esc(p.parentName)+'</span>':'')+'<span class="b '+(fee?.status==='paid'?'bg':fee?.status==='overdue'?'br':'bo')+'">'+(fee?.status||'no fee set')+'</span></div></div></div>';
  h+='<div class="sg" style="grid-template-columns:repeat(3,1fr)"><div class="sc" style="padding:11px;text-align:center"><div class="sv" style="font-size:22px;color:'+(att>=80?'var(--gr)':'var(--go)')+'">'+att+'%</div><div class="sl">Attend.</div></div><div class="sc" style="padding:11px;text-align:center"><div class="sv" style="font-size:20px">'+wl.w+'W '+wl.l+'L</div><div class="sl">Record</div></div><div class="sc" style="padding:11px;text-align:center"><div class="sv" style="font-size:22px;color:var(--gr)">'+wp+'%</div><div class="sl">Win %</div></div></div>';
  h+='<div class="wl"><div class="wl-f" style="width:'+wp+'%"></div></div>';
  h+='<div class="st">Skills <span style="float:right;font-weight:400;color:var(--mu2);font-size:11px">avg '+avgSk+'</span></div>';
  SKILLS.forEach(s=>{const v=sk[s]||50;h+='<div class="sk-row"><div class="sk-hd"><span style="font-size:13px;color:var(--mu2)">'+s+'</span><span style="font-size:13px;font-weight:700;color:'+skc(v)+'">'+v+'</span></div><div class="sk-tr"><div class="sk-fl" style="width:'+v+'%;background:'+skc(v)+'"></div></div></div>';});
  if(slogs.length)h+='<div style="font-size:11px;color:var(--mu);margin-bottom:4px">Last updated · '+esc(slogs[0].updatedBy||'—')+' · '+fmtD(slogs[0].createdAt)+'</div>';
  h+='<button class="btn btn-s btn-w" style="margin:8px 0 0" onclick="openSkEd(\''+id+'\')">✏️ Update Skills</button>';
  h+='<div class="st">Attendance <span style="float:right;font-weight:400;color:var(--mu2);font-size:11px">'+moA.filter(x=>x.present).length+'/'+moA.length+'</span></div><div class="att-w">';
  for(let d=1;d<=dim;d++){const rec=moA.find(a=>{const ad=a.date?.toDate?a.date.toDate():new Date(a.date||0);return ad.getDate()===d;});const cls=rec?(rec.present?'P':'A'):'N';const ds=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');h+='<div class="ad '+cls+'" title="Day '+d+'"'+(isCA()?' onclick="togA(\''+id+'\',\''+ds+'\',this)" style="cursor:pointer"':' style="cursor:default"')+'></div>';}
  h+='</div>';
  h+='<div class="st">Coach Notes</div>';
  if(isCA()){h+='<div style="margin-bottom:12px"><textarea class="fta" id="nn-'+id+'" placeholder="Add note…" style="margin-bottom:8px"></textarea><div style="display:flex;align-items:center;gap:8px"><div id="stars-'+id+'">'+[1,2,3,4,5].map(i=>'<span style="font-size:20px;cursor:pointer;color:var(--bd2)" onclick="setStar(\''+id+'\','+i+')">★</span>').join('')+'</div><button class="btn btn-p btn-sm" style="margin-left:auto" onclick="addNote(\''+id+'\')">Add Note</button></div></div>';}
  if(!notes.length)h+='<div class="empty" style="padding:20px"><div class="empty-ic">📝</div>No notes yet</div>';
  else{notes.slice(0,8).forEach(n=>{const st=n.rating?'★'.repeat(n.rating)+'<span style="color:var(--bd2)">★</span>'.repeat(5-n.rating):'';h+='<div class="ne"><div class="ne-m">'+esc(n.coach||'Coach')+' · '+fmtD(n.createdAt)+'</div><div class="ne-t">'+esc(n.text)+'</div>'+(st?'<div style="color:var(--go);font-size:13px;margin-top:4px">'+st+'</div>':'')+'</div>';});if(notes.length>8)h+='<div style="font-size:12px;color:var(--mu);text-align:center;margin-top:6px">+'+(notes.length-8)+' more</div>';}
  if(isA())h+='<div class="div"></div><div style="display:flex;gap:8px"><button class="btn btn-s" style="flex:1" onclick="openEditPl(\''+id+'\')">Edit</button><button class="btn btn-d" style="flex:1" onclick="delPl(\''+id+'\',\''+esc(p.name)+'\')">Delete</button></div>';
  openM(h);
};
const STARS={};
window.setStar=function(id,v){STARS[id]=v;const c=$('stars-'+id);if(!c)return;c.querySelectorAll('span').forEach((s,i)=>s.style.color=i<v?'var(--go)':'var(--bd2)');};
window.addNote=async function(id){const ta=$('nn-'+id);const t=ta?.value?.trim();if(!t){toast('Write something first');return;}await dbAdd('notes',{playerId:id,text:t,coach:S.user.name,rating:STARS[id]||0});ta.value='';STARS[id]=0;if($('stars-'+id))$('stars-'+id).querySelectorAll('span').forEach(s=>s.style.color='var(--bd2)');toast('Note added ✓');};
window.togA=async function(id,ds,el){if(!isCA())return;const ex=S.attendance.find(a=>{const d=a.date?.toDate?a.date.toDate():new Date(a.date||0);const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');return a.playerId===id&&k===ds;});if(ex){const np=!ex.present;await dbUpd('attendance',ex.id,{present:np,markedBy:S.user.name});el.className='ad '+(np?'P':'A');}else{await dbAdd('attendance',{playerId:id,date:Timestamp.fromDate(new Date(ds)),present:true,markedBy:S.user.name});el.className='ad P';}};
window.openSkEd=function(id){const sk=pSkills(id);let h='<div class="mh"></div><div class="mt">Update Skills</div><div class="ms">'+esc(S.user.name)+'</div>';SKILLS.forEach(s=>{const v=sk[s]||50;h+='<div class="sk-row"><div class="sk-hd"><span style="font-size:13px;color:var(--mu2)">'+s+'</span><span style="font-size:13px;font-weight:700" id="sv-'+s+'">'+v+'</span></div><input type="range" min="0" max="100" value="'+v+'" data-sk="'+s+'" oninput="document.getElementById(\'sv-'+s+'\').textContent=this.value"></div>';});h+='<div class="ma"><button class="btn btn-s" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveSk(\''+id+'\')">Save</button></div>';openM(h);};
window.saveSk=async function(id){const sk={};document.querySelectorAll('input[type=range][data-sk]').forEach(e=>{sk[e.dataset.sk]=+e.value;});await dbAdd('skillLogs',{playerId:id,skills:sk,updatedBy:S.user.name});toast('Skills updated ✓');closeM();};
window.openAddPl=function(){openM('<div class="mh"></div><div class="mt">Add Player</div><div class="fg"><label class="fl">Full Name</label><input class="fi" id="np-nm" placeholder="Player\'s full name"></div><div class="fr2"><div class="fg"><label class="fl">Age</label><input class="fi" id="np-ag" type="number" placeholder="14"></div><div class="fg"><label class="fl">Category</label><select class="fs" id="np-ct">'+CATS.map(c=>'<option>'+c+'</option>').join('')+'</select></div></div><div class="fg"><label class="fl">Parent Name</label><input class="fi" id="np-pn" placeholder="Parent full name"></div><div class="fr2"><div class="fg"><label class="fl">Player PIN</label><input class="fi" id="np-pp" type="password" maxlength="4" placeholder="4 digits" inputmode="numeric"></div><div class="fg"><label class="fl">Parent PIN</label><input class="fi" id="np-prp" type="password" maxlength="4" placeholder="4 digits" inputmode="numeric"></div></div><div class="ma"><button class="btn btn-s" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveNewPl()">Add</button></div>');};

function vCal(){
  const now=new Date(),m=S.calMonth,first=new Date(m.getFullYear(),m.getMonth(),1),last=new Date(m.getFullYear(),m.getMonth()+1,0);
  const lbl=m.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const todaySess=S.sessions.filter(s=>{if(!s.sessionDate)return false;const sd=s.sessionDate?.toDate?s.sessionDate.toDate():new Date(s.sessionDate);return sd.getDate()===now.getDate()&&sd.getMonth()===now.getMonth()&&sd.getFullYear()===now.getFullYear();});
  const upcoming=[...S.sessions].filter(s=>{if(!s.sessionDate)return false;const sd=s.sessionDate?.toDate?s.sessionDate.toDate():new Date(s.sessionDate);return sd>now;}).sort((a,b)=>{const da=a.sessionDate?.toDate?a.sessionDate.toDate():new Date(a.sessionDate||0),db2=b.sessionDate?.toDate?b.sessionDate.toDate():new Date(b.sessionDate||0);return da-db2;}).slice(0,5);

  for(let i=0;i<first.getDay();i++)h+='<div class="cal-d om"></div>';
  for(let d=1;d<=last.getDate();d++){const isT=d===now.getDate()&&m.getMonth()===now.getMonth()&&m.getFullYear()===now.getFullYear();const haS=S.sessions.some(s=>{if(!s.sessionDate)return false;const sd=s.sessionDate?.toDate?s.sessionDate.toDate():new Date(s.sessionDate);return sd.getDate()===d&&sd.getMonth()===m.getMonth()&&sd.getFullYear()===m.getFullYear();});h+='<div class="cal-d'+(isT?' today':'')+(haS?' hs':'')+'" onclick="openDay('+m.getFullYear()+','+m.getMonth()+','+d+')">'+d+'</div>';}

function vMyCal(){

  if(up.length){h+='<div class="st">Upcoming</div>';up.slice(0,5).forEach(s=>h+=scCard(s,false));}else h+='<div class="empty" style="padding:24px"><div class="empty-ic">📅</div>No upcoming sessions</div>';

window.parPay=async function(id){
  const fileInput=$('par-receipt'),note=$('par-note')?.value?.trim()||'',file=fileInput?.files?.[0];
  let receiptUrl='';
  if(file)receiptUrl=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);});
  await dbAdd('fees',{playerId:id,amount:0,status:'pending-verification',notes:note?note+' · Awaiting verification':'Awaiting admin verification',receiptUrl,updatedBy:'Parent',updatedAt:serverTimestamp()});
  toast('Payment submitted ✓');if($('par-receipt'))$('par-receipt').value='';if($('par-note'))$('par-note').value='';render();
};
window.chPin=async function(id,type){const n=$('cp-n')?.value?.trim(),c=$('cp-c')?.value?.trim();if(!n||n.length!==4||!c||c.length!==4){toast('Enter 4-digit PIN');return;}if(n!==c){toast('PINs do not match');return;}await dbSet('players',id,{[type==='parent'?'parentPin':'playerPin']:n});toast('PIN updated ✓');};
function calcPOTM(){
  if(!S.players.length)return null;
  const{s:ms,e:me}=moRange();
  const scores=S.players.map(p=>{
    const att=S.attendance.filter(a=>{const d=a.date?.toDate?a.date.toDate():new Date(a.date||0);return a.playerId===p.id&&d>=ms&&d<=me;});
    const attPct=att.length?pct(att.filter(x=>x.present).length,att.length):0;
    const logs=[...S.skillLogs.filter(x=>x.playerId===p.id)].sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    let skD=50;if(logs.length>=2){const pr=logs[logs.length-2].skills||{},cu=logs[logs.length-1].skills||{};const pa=Object.values(pr).reduce((a,b)=>a+b,0)/(Object.values(pr).length||1),ca=Object.values(cu).reduce((a,b)=>a+b,0)/(Object.values(cu).length||1);skD=Math.min(100,Math.max(0,50+(ca-pa)*5));}
    const mM=S.matches.filter(m=>{const d=m.createdAt?.toDate?m.createdAt.toDate():new Date(m.createdAt||0);return m.playerId===p.id&&d>=ms&&d<=me&&(m.result==='W'||m.result==='L');});
    const effW=mM.filter(m=>m.result==='W').length*(mM.some(m=>m.lateUpload)?0.8:1);
    const wPct=mM.length?pct(Math.max(0,effW),mM.length):0;
    const mN=S.notes.filter(n=>{const d=n.createdAt?.toDate?n.createdAt.toDate():new Date(n.createdAt||0);return n.playerId===p.id&&n.rating>0&&d>=ms&&d<=me;});
    const rat=mN.length?mN.reduce((a,b)=>a+(b.rating||0),0)/mN.length:0;
    return{id:p.id,name:p.name,score:Math.min(100,Math.max(0,Math.round((attPct+skD+wPct+(rat*20))/4)))};
  }).sort((a,b)=>b.score-a.score);
  return scores[0]||null;
}
function openM(html){
  closeM();
  const ov=document.createElement('div');ov.className='mo';ov.id='mo';ov.onclick=e=>{if(e.target===ov)closeM();};
  const mb=document.createElement('div');mb.className='mb';mb.innerHTML=html;ov.appendChild(mb);document.body.appendChild(ov);
  let sy=0;
  mb.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
  mb.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-sy>80&&mb.scrollTop<=0)closeM();},{passive:true});
}
window.closeM=function(){const o=$('mo');if(o)o.remove();};
let dPmt;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dPmt=e;$('ibanner').style.display='flex';});
const ib=$('ibtn');if(ib)ib.onclick=()=>{if(dPmt)dPmt.prompt();$('ibanner').style.display='none';};
async function init(){
  try{
    await signInAnonymously(auth);listen();
    const snap=await getDocs(collection(db,'players'));
    S.players=snap.docs.map(d=>({id:d.id,...d.data()}));
    try{
      const saved=localStorage.getItem('td_u');
      if(saved){
        const u=JSON.parse(saved);let valid=false;
        if(u.type==='admin')valid=true;
        else if(u.type==='coach')valid=!!COACHES.find(c=>c.id===u.id);
        else if(u.type==='player'||u.type==='parent')valid=!!S.players.find(p=>p.id===u.playerId);
        if(valid){S.user=u;$('loading').style.display='none';$('app').style.display='flex';$('hdr-u').textContent=S.user.name;buildNav();S.tab='overview';render();return;}
        else localStorage.removeItem('td_u');
      }
    }catch(e){}
    $('loading').style.display='none';$('login').style.display='flex';
  }catch(e){
    $('loading').innerHTML='<div style="color:var(--re);text-align:center;padding:24px;max-width:300px"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-weight:600;margin-bottom:8px">Connection Failed</div><div style="font-size:13px;color:var(--mu2);line-height:1.5">'+e.message+'</div></div>';
  }
}
init();
